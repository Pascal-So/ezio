name: Check Frontend

on:
  push: {}
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Typecheck
        working-directory: ./frontend
        run: |
          npm run build

      # TODO: eslint & tests
